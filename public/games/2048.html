<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 - GameHub</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { background: #000; padding: 0; margin: 0; }
    .game-viewport { margin: 0; width: 100vw; height: 100vh; border-radius: 0; border: none; }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      background: #bbada0;
      padding: 12px;
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
      aspect-ratio: 1;
    }

    .grid-cell {
      background: rgba(238, 228, 218, 0.35);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.5rem;
      color: #776e65;
      transition: all 0.1s;
    }

    /* Tile Colors */
    .v2 { background: #eee4da; }
    .v4 { background: #ede0c8; }
    .v8 { background: #f2b179; color: #f9f6f2; }
    .v16 { background: #f59563; color: #f9f6f2; }
    .v32 { background: #f67c5f; color: #f9f6f2; }
    .v64 { background: #f65e3b; color: #f9f6f2; }
    .v128 { background: #edcf72; color: #f9f6f2; font-size: 1.2rem; }
    .v256 { background: #edcc61; color: #f9f6f2; font-size: 1.2rem; }
    .v512 { background: #edc850; color: #f9f6f2; font-size: 1.2rem; }
    .v1024 { background: #edc53f; color: #f9f6f2; font-size: 1rem; }
    .v2048 { background: #edc22e; color: #f9f6f2; font-size: 1rem; box-shadow: 0 0 20px #edc22e; }
  </style>
</head>
<body>
  <div class="game-viewport">
    <div class="game-header">
      <div class="game-title-area">
        <h2>🔢 2048</h2>
      </div>
      <div class="game-stats-grid">
        <div class="game-stat-item">
          <span class="game-stat-label">Score</span>
          <span class="game-stat-value" id="score">0</span>
        </div>
        <div class="game-stat-item">
          <span class="game-stat-label">Best</span>
          <span class="game-stat-value" id="best">0</span>
        </div>
      </div>
    </div>

    <div class="game-canvas-area">
      <div class="grid-container" id="grid"></div>

      <div id="overlay" class="game-overlay-screen">
        <h2 class="game-overlay-title" id="overlayTitle">Game Over</h2>
        <p id="overlayText" style="margin-bottom: 2rem; color: var(--text-muted);"></p>
        <button class="btn btn-primary" onclick="initGame()">Try Again</button>
      </div>
    </div>

    <div class="game-footer">
      <div style="color: var(--text-muted); font-size: 0.8rem;">Use Arrow Keys to slide tiles</div>
      <button class="btn" onclick="window.parent.closeGameContainer()" style="margin-left: auto;">Exit</button>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    let board = [];
    let score = 0;
    let best = localStorage.getItem('2048_best') || 0;
    document.getElementById('best').textContent = best;

    function initGame() {
      board = Array(16).fill(0);
      score = 0;
      document.getElementById('score').textContent = '0';
      document.getElementById('overlay').classList.remove('active');
      addTile();
      addTile();
      render();
    }

    function addTile() {
      const empty = board.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
      if(empty.length > 0) {
        board[empty[Math.floor(Math.random() * empty.length)]] = Math.random() < 0.9 ? 2 : 4;
      }
    }

    function render() {
      const container = document.getElementById('grid');
      container.innerHTML = '';
      board.forEach(v => {
        const cell = document.createElement('div');
        cell.className = 'grid-cell' + (v > 0 ? ` v${v}` : '');
        cell.textContent = v > 0 ? v : '';
        container.appendChild(cell);
      });
    }

    function move(dir) {
      let moved = false;
      const size = 4;

      const getRow = i => board.slice(i * size, i * size + size);
      const setRow = (i, row) => { for(let j=0; j<size; j++) board[i*size + j] = row[j]; };
      const getCol = i => [board[i], board[i+size], board[i+2*size], board[i+3*size]];
      const setCol = (i, col) => { board[i]=col[0]; board[i+size]=col[1]; board[i+2*size]=col[2]; board[i+3*size]=col[3]; };

      const slide = (arr) => {
        let filtered = arr.filter(v => v !== 0);
        for(let i=0; i<filtered.length-1; i++) {
          if(filtered[i] === filtered[i+1]) {
            filtered[i] *= 2;
            score += filtered[i];
            filtered.splice(i+1, 1);
            moved = true;
          }
        }
        while(filtered.length < size) filtered.push(0);
        return filtered;
      };

      for(let i=0; i<size; i++) {
        let original, current, after;
        if(dir === 'left' || dir === 'right') {
          original = getRow(i);
          current = [...original];
          if(dir === 'right') current.reverse();
          after = slide(current);
          if(dir === 'right') after.reverse();
          if(JSON.stringify(original) !== JSON.stringify(after)) moved = true;
          setRow(i, after);
        } else {
          original = getCol(i);
          current = [...original];
          if(dir === 'down') current.reverse();
          after = slide(current);
          if(dir === 'down') after.reverse();
          if(JSON.stringify(original) !== JSON.stringify(after)) moved = true;
          setCol(i, after);
        }
      }

      if(moved) {
        addTile();
        render();
        document.getElementById('score').textContent = score;
        if(score > best) {
          best = score;
          localStorage.setItem('2048_best', best);
          document.getElementById('best').textContent = best;
        }
      }

      if(!board.includes(0) && !canMove()) gameOver();
    }

    function canMove() {
      for(let i=0; i<16; i++) {
        if(i%4 < 3 && board[i] === board[i+1]) return true;
        if(i < 12 && board[i] === board[i+4]) return true;
      }
      return false;
    }

    function gameOver() {
      document.getElementById('overlay').classList.add('active');
      document.getElementById('overlayText').textContent = `Final Score: ${score}`;
      if(typeof updateCoins === 'function') updateCoins(Math.floor(score/10), '2048', 'win');
    }

    window.addEventListener('keydown', e => {
      if(e.key === 'ArrowLeft') move('left');
      if(e.key === 'ArrowRight') move('right');
      if(e.key === 'ArrowUp') move('up');
      if(e.key === 'ArrowDown') move('down');
    });

    initGame();
  </script>
</body>
</html>
