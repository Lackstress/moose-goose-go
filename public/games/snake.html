<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake - GameHub</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { background: #000; padding: 0; margin: 0; }
    .game-viewport { margin: 0; width: 100vw; height: 100vh; border-radius: 0; border: none; }
    .game-canvas-area { flex: 1; }
  </style>
</head>
<body>
  <div class="game-viewport">
    <div class="game-header">
      <div class="game-title-area">
        <h2>🐍 Snake</h2>
      </div>
      <div class="game-stats-grid">
        <div class="game-stat-item">
          <span class="game-stat-label">Score</span>
          <span class="game-stat-value" id="score">0</span>
        </div>
        <div class="game-stat-item">
          <span class="game-stat-label">High Score</span>
          <span class="game-stat-value" id="highScore">0</span>
        </div>
      </div>
    </div>

    <div class="game-canvas-area">
      <canvas id="gameCanvas" width="600" height="600"></canvas>

      <div id="overlay" class="game-overlay-screen">
        <h2 class="game-overlay-title" id="overlayTitle">Paused</h2>
        <p id="overlayText" style="margin-bottom: 2rem; color: var(--text-muted);">Press SPACE to start</p>
        <button class="btn btn-primary" onclick="resetGame()">Try Again</button>
      </div>
    </div>

    <div class="game-footer">
      <button class="btn btn-primary" id="btnPause">Pause</button>
      <button class="btn" onclick="window.parent.closeGameContainer()">Exit</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const GRID_SIZE = 20;
    const CELL_SIZE = canvas.width / GRID_SIZE;

    let snake = [{x: 10, y: 10}];
    let food = {x: 15, y: 10};
    let dx = 1;
    let dy = 0;
    let score = 0;
    let highScore = localStorage.getItem('snake_hi') || 0;
    let gameRunning = false;
    let lastTime = 0;
    let moveTimer = 0;
    let moveInterval = 100; // ms

    document.getElementById('highScore').textContent = highScore;

    function draw() {
      // Background
      ctx.fillStyle = '#050505';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid Lines
      ctx.strokeStyle = '#111';
      ctx.lineWidth = 0.5;
      for(let i=0; i<=GRID_SIZE; i++) {
        ctx.beginPath(); ctx.moveTo(i*CELL_SIZE, 0); ctx.lineTo(i*CELL_SIZE, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i*CELL_SIZE); ctx.lineTo(canvas.width, i*CELL_SIZE); ctx.stroke();
      }

      // Food
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, Math.PI*2);
      ctx.fill();

      // Snake
      snake.forEach((segment, i) => {
        ctx.fillStyle = i === 0 ? '#8b5cf6' : '#6d28d9';
        ctx.fillRect(segment.x * CELL_SIZE + 1, segment.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
      });
    }

    function update() {
      const head = {x: snake[0].x + dx, y: snake[0].y + dy};

      // Wall Collision
      if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) return gameOver();

      // Self Collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

      snake.unshift(head);

      // Food Collision
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById('score').textContent = score;
        spawnFood();
        moveInterval = Math.max(50, 100 - (score / 10));
      } else {
        snake.pop();
      }
    }

    function spawnFood() {
      food = {
        x: Math.floor(Math.random() * GRID_SIZE),
        y: Math.floor(Math.random() * GRID_SIZE)
      };
      if (snake.some(s => s.x === food.x && s.y === food.y)) spawnFood();
    }

    function gameLoop(timestamp) {
      if (!gameRunning) return;
      
      const deltaTime = timestamp - lastTime;
      lastTime = timestamp;
      moveTimer += deltaTime;

      if (moveTimer >= moveInterval) {
        update();
        moveTimer = 0;
      }

      draw();
      requestAnimationFrame(gameLoop);
    }

    function gameOver() {
      gameRunning = false;
      document.getElementById('overlay').classList.add('active');
      document.getElementById('overlayTitle').textContent = 'Game Over';
      document.getElementById('overlayText').textContent = 'Final Score: ' + score;
      
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snake_hi', highScore);
        document.getElementById('highScore').textContent = highScore;
      }
    }

    function resetGame() {
      snake = [{x: 10, y: 10}];
      dx = 1; dy = 0;
      score = 0;
      moveInterval = 100;
      document.getElementById('score').textContent = '0';
      document.getElementById('overlay').classList.remove('active');
      spawnFood();
      gameRunning = true;
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', e => {
      if (!gameRunning && e.code === 'Space') return resetGame();

      switch(e.key) {
        case 'ArrowUp': if(dy !== 1) { dx = 0; dy = -1; } break;
        case 'ArrowDown': if(dy !== -1) { dx = 0; dy = 1; } break;
        case 'ArrowLeft': if(dx !== 1) { dx = -1; dy = 0; } break;
        case 'ArrowRight': if(dx !== -1) { dx = 1; dy = 0; } break;
      }
    });

    document.getElementById('btnPause').onclick = () => {
      gameRunning = !gameRunning;
      if (gameRunning) {
        document.getElementById('overlay').classList.remove('active');
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
      } else {
        document.getElementById('overlay').classList.add('active');
        document.getElementById('overlayTitle').textContent = 'Paused';
      }
    };

    // Start screen
    draw();
    document.getElementById('overlay').classList.add('active');
  </script>
</body>
</html>
