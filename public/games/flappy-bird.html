<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird - GameHub</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { background: #000; padding: 0; margin: 0; }
    .game-viewport { margin: 0; width: 100vw; height: 100vh; border-radius: 0; border: none; }
    #gameCanvas { background: #70c5ce; }
  </style>
</head>
<body>
  <div class="game-viewport">
    <div class="game-header">
      <div class="game-title-area">
        <h2>🐦 Flappy Bird</h2>
      </div>
      <div class="game-stats-grid">
        <div class="game-stat-item">
          <span class="game-stat-label">Score</span>
          <span class="game-stat-value" id="score">0</span>
        </div>
        <div class="game-stat-item">
          <span class="game-stat-label">High Score</span>
          <span class="game-stat-value" id="highScore">0</span>
        </div>
      </div>
    </div>

    <div class="game-canvas-area">
      <canvas id="gameCanvas" width="400" height="600"></canvas>

      <div id="overlay" class="game-overlay-screen">
        <h2 class="game-overlay-title" id="overlayTitle">Paused</h2>
        <p id="overlayText" style="margin-bottom: 2rem; color: var(--text-muted);">Press SPACE to flap</p>
        <button class="btn btn-primary" onclick="resetGame()">Try Again</button>
      </div>
    </div>

    <div class="game-footer">
      <div style="color: var(--text-muted); font-size: 0.8rem;">Space or Click to Jump</div>
      <button class="btn" onclick="window.parent.closeGameContainer()" style="margin-left: auto;">Exit</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });

    let bird = { x: 50, y: 300, v: 0, gravity: 0.25, jump: -4.5 };
    let pipes = [];
    let score = 0;
    let highScore = localStorage.getItem('flappy_hi') || 0;
    let gameActive = false;
    let lastTime = 0;

    document.getElementById('highScore').textContent = highScore;

    function draw() {
      // Sky
      ctx.fillStyle = '#70c5ce';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Pipes
      ctx.fillStyle = '#22c55e';
      pipes.forEach(p => {
        ctx.fillRect(p.x, 0, 50, p.top);
        ctx.fillRect(p.x, p.top + 150, 50, canvas.height);
      });

      // Bird
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.arc(bird.x, bird.y, 15, 0, Math.PI*2);
      ctx.fill();
    }

    function update() {
      bird.v += bird.gravity;
      bird.y += bird.v;

      if(bird.y > canvas.height || bird.y < 0) return gameOver();

      pipes.forEach(p => {
        p.x -= 2;
        if(p.x === 50) { score++; document.getElementById('score').textContent = score; }
        if(bird.x + 15 > p.x && bird.x - 15 < p.x + 50) {
          if(bird.y - 15 < p.top || bird.y + 15 > p.top + 150) return gameOver();
        }
      });

      if(pipes.length > 0 && pipes[0].x < -50) pipes.shift();
      if(pipes.length === 0 || pipes[pipes.length-1].x < 250) {
        pipes.push({ x: 400, top: Math.random() * (canvas.height - 250) + 50 });
      }
    }

    function gameLoop(timestamp) {
      if(!gameActive) return;
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    function gameOver() {
      gameActive = false;
      document.getElementById('overlay').classList.add('active');
      document.getElementById('overlayTitle').textContent = 'Game Over';
      document.getElementById('overlayText').textContent = 'Score: ' + score;
      if(score > highScore) {
        highScore = score;
        localStorage.setItem('flappy_hi', highScore);
        document.getElementById('highScore').textContent = highScore;
      }
    }

    function resetGame() {
      bird = { x: 50, y: 300, v: 0, gravity: 0.25, jump: -4.5 };
      pipes = [];
      score = 0;
      document.getElementById('score').textContent = '0';
      document.getElementById('overlay').classList.remove('active');
      gameActive = true;
      requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', e => {
      if(e.code === 'Space') {
        if(!gameActive) resetGame();
        else bird.v = bird.jump;
      }
    });
    canvas.addEventListener('mousedown', () => {
      if(!gameActive) resetGame();
      else bird.v = bird.jump;
    });

    draw();
    document.getElementById('overlay').classList.add('active');
    document.getElementById('overlayTitle').textContent = 'Flappy Bird';
  </script>
</body>
</html>
