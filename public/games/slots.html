<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slots - GameHub</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { background: #000; padding: 0; margin: 0; }
    .game-viewport { margin: 0; width: 100vw; height: 100vh; border-radius: 0; border: none; }

    .slots-container {
      display: flex;
      gap: 20px;
      padding: 40px;
      background: linear-gradient(to bottom, #111, #222);
      border-radius: 20px;
      border: 4px solid #fbbf24;
      box-shadow: 0 0 50px rgba(251, 191, 36, 0.2);
    }

    .slot-reel {
      width: 100px;
      height: 140px;
      background: #fff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      border: 3px solid #333;
      overflow: hidden;
    }

    .slot-reel.spinning {
      animation: slotSpin 0.1s linear infinite;
    }

    @keyframes slotSpin {
      0% { transform: translateY(-10px); }
      100% { transform: translateY(10px); }
    }

    .win-display {
      font-size: 1.5rem;
      font-weight: 800;
      color: #fbbf24;
      margin-top: 2rem;
      height: 2rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="game-viewport">
    <div class="game-header">
      <div class="game-title-area">
        <h2>🎰 Classic Slots</h2>
      </div>
      <div class="game-stats-grid">
        <div class="game-stat-item">
          <span class="game-stat-label">Balance</span>
          <span class="game-stat-value" id="balance">1000</span>
        </div>
      </div>
    </div>

    <div class="game-canvas-area" style="flex-direction: column;">
      <div class="slots-container">
        <div class="slot-reel" id="r1">🍒</div>
        <div class="slot-reel" id="r2">🍒</div>
        <div class="slot-reel" id="r3">🍒</div>
      </div>
      <div class="win-display" id="winMsg"></div>

      <div id="overlay" class="game-overlay-screen">
        <h2 class="game-overlay-title" id="overlayTitle">JACKPOT!</h2>
        <p id="overlayText" style="margin-bottom: 2rem;"></p>
        <button class="btn btn-primary" onclick="resetUI()">Continue</button>
      </div>
    </div>

    <div class="game-footer">
      <div style="display: flex; gap: 1rem; align-items: center;">
        <span class="game-stat-label">Bet:</span>
        <button class="btn btn-sm" onclick="setBet(10)">$10</button>
        <button class="btn btn-sm" onclick="setBet(50)">$50</button>
        <button class="btn btn-sm" onclick="setBet(100)">$100</button>
      </div>
      <button class="btn btn-primary" id="spinBtn" onclick="spin()" style="padding: 1rem 3rem; font-size: 1.2rem;">SPIN</button>
      <button class="btn" onclick="window.parent.closeGameContainer()" style="margin-left: auto;">Exit</button>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    const SYMBOLS = ['🍒', '🍋', '🍇', '💎', '7️⃣', '⭐'];
    let currentBet = 10;
    let spinning = false;

    function setBet(amt) {
      if(spinning) return;
      currentBet = amt;
      if(window.parent && typeof window.parent.showNotification === 'function') {
        window.parent.showNotification(`Bet set to $${amt}`, 'info');
      }
    }

    function spin() {
      if(spinning || userCoins < currentBet) return;
      
      spinning = true;
      document.getElementById('spinBtn').disabled = true;
      document.getElementById('winMsg').textContent = '';
      
      updateCoins(-currentBet, 'slots', 'bet');
      document.getElementById('balance').textContent = userCoins;

      const reels = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3')];
      reels.forEach(r => r.classList.add('spinning'));

      setTimeout(() => {
        const results = [
          SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)],
          SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)],
          SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]
        ];

        reels.forEach((r, i) => {
          r.classList.remove('spinning');
          r.textContent = results[i];
        });

        checkWin(results);
        spinning = false;
        document.getElementById('spinBtn').disabled = false;
      }, 1500);
    }

    function checkWin(res) {
      let payout = 0;
      if(res[0] === res[1] && res[1] === res[2]) {
        const mult = res[0] === '7️⃣' ? 50 : res[0] === '💎' ? 20 : 10;
        payout = currentBet * mult;
      } else if(res[0] === res[1] || res[1] === res[2]) {
        payout = currentBet * 2;
      }

      if(payout > 0) {
        updateCoins(payout, 'slots', 'win');
        document.getElementById('balance').textContent = userCoins;
        document.getElementById('winMsg').textContent = `WINNER! +$${payout}`;

        if(payout >= currentBet * 10) {
          document.getElementById('overlay').classList.add('active');
          document.getElementById('overlayText').textContent = `You won $${payout}!`;
        }
      } else {
        document.getElementById('winMsg').textContent = 'TRY AGAIN';
      }
    }

    function resetUI() {
      document.getElementById('overlay').classList.remove('active');
    }

    window.addEventListener('load', () => {
      document.getElementById('balance').textContent = userCoins || 0;
    });
  </script>
</body>
</html>
