<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roulette - GameHub</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { background: #000; padding: 0; margin: 0; }
    .game-viewport { margin: 0; width: 100vw; height: 100vh; border-radius: 0; border: none; }

    .roulette-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle, #064e3b 0%, #022c22 100%);
      padding: 1rem;
      overflow-y: auto;
    }

    .wheel-area {
      position: relative;
      width: 300px;
      height: 300px;
      margin-bottom: 2rem;
    }

    #wheelCanvas {
      width: 100%;
      height: 100%;
    }

    .wheel-pointer {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 20px solid #fbbf24;
      z-index: 10;
    }

    .betting-grid {
      display: grid;
      grid-template-columns: 40px repeat(12, 1fr);
      gap: 2px;
      background: #fff;
      padding: 2px;
      border-radius: 4px;
      max-width: 90%;
    }

    .cell {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      cursor: pointer;
      font-size: 0.8rem;
      position: relative;
    }

    .cell.green { background: #10b981; color: #fff; }
    .cell.red { background: #ef4444; color: #fff; }
    .cell.black { background: #111; color: #fff; }

    .chip-on-cell {
      position: absolute;
      width: 20px;
      height: 20px;
      background: #fbbf24;
      border: 2px dashed #000;
      border-radius: 50%;
      font-size: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      pointer-events: none;
    }

    .outside-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 5px;
      margin-top: 10px;
      width: 90%;
    }

    .outside-cell {
      height: 40px;
      background: #065f46;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="game-viewport">
    <div class="game-header">
      <div class="game-title-area">
        <h2>🎰 Roulette</h2>
      </div>
      <div class="game-stats-grid">
        <div class="game-stat-item">
          <span class="game-stat-label">Balance</span>
          <span class="game-stat-value" id="balance">1000</span>
        </div>
        <div class="game-stat-item">
          <span class="game-stat-label">Total Bet</span>
          <span class="game-stat-value" id="totalBet">0</span>
        </div>
      </div>
    </div>

    <div class="roulette-container">
      <div class="wheel-area">
        <div class="wheel-pointer"></div>
        <canvas id="wheelCanvas" width="400" height="400"></canvas>
      </div>

      <div class="betting-grid" id="grid"></div>
      <div class="outside-grid">
        <div class="outside-cell" onclick="placeOutside('low')">1-18</div>
        <div class="outside-cell" onclick="placeOutside('even')">EVEN</div>
        <div class="outside-cell" style="background:#ef4444" onclick="placeOutside('red')">RED</div>
        <div class="outside-cell" style="background:#111" onclick="placeOutside('black')">BLACK</div>
        <div class="outside-cell" onclick="placeOutside('odd')">ODD</div>
        <div class="outside-cell" onclick="placeOutside('high')">19-36</div>
      </div>

      <div id="overlay" class="game-overlay-screen">
        <h2 class="game-overlay-title" id="overlayTitle">32 Red</h2>
        <p id="overlayText" style="margin-bottom: 2rem;"></p>
        <button class="btn btn-primary" onclick="resetUI()">Continue</button>
      </div>
    </div>

    <div class="game-footer">
      <div style="display: flex; gap: 1rem; align-items: center;">
        <span class="game-stat-label">Chip:</span>
        <button class="btn btn-sm" onclick="chip=1">$1</button>
        <button class="btn btn-sm" onclick="chip=5">$5</button>
        <button class="btn btn-sm" onclick="chip=10">$10</button>
      </div>
      <button class="btn btn-primary" id="spinBtn" onclick="spin()" style="padding: 1rem 3rem;">SPIN</button>
      <button class="btn" onclick="clearBets()">Clear</button>
      <button class="btn" onclick="window.parent.closeGameContainer()" style="margin-left: auto;">Exit</button>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    const LAYOUT = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
    const REDS = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    let chip = 1, bets = {}, spinning = false, rotation = 0;

    function initGrid() {
      const g = document.getElementById('grid');
      g.innerHTML = '<div class="cell green" style="grid-row: 1/4" onclick="place(0)">0</div>';
      for(let i=1; i<=36; i++) {
        const c = document.createElement('div');
        c.className = `cell ${REDS.includes(i) ? 'red' : 'black'}`;
        c.textContent = i;
        c.onclick = () => place(i);
        const col = Math.floor((i-1)/3) + 2;
        const row = 3 - ((i-1)%3);
        c.style.gridColumn = col;
        c.style.gridRow = row;
        g.appendChild(c);
      }
    }

    function place(n) {
      if(spinning || userCoins < chip) return;
      bets[n] = (bets[n] || 0) + chip;
      updateCoins(-chip, 'roulette', 'bet');
      updateUI();
    }

    function placeOutside(type) {
      if(spinning || userCoins < chip) return;
      bets[type] = (bets[type] || 0) + chip;
      updateCoins(-chip, 'roulette', 'bet');
      updateUI();
    }

    function updateUI() {
      document.getElementById('balance').textContent = userCoins;
      let total = 0; Object.values(bets).forEach(v => total += v);
      document.getElementById('totalBet').textContent = total;
    }

    function clearBets() {
      if(spinning) return;
      let total = 0; Object.values(bets).forEach(v => total += v);
      updateCoins(total, 'roulette', 'clear');
      bets = {};
      updateUI();
    }

    function drawWheel(rot) {
      const canvas = document.getElementById('wheelCanvas');
      const ctx = canvas.getContext('2d');
      const cx = 200, cy = 200, r = 180;
      ctx.clearRect(0,0,400,400);
      
      LAYOUT.forEach((n, i) => {
        const ang = (i / 37) * Math.PI * 2 + rot;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, ang, ang + (Math.PI * 2 / 37));
        ctx.fillStyle = n === 0 ? '#10b981' : REDS.includes(n) ? '#ef4444' : '#111';
        ctx.fill();
        ctx.strokeStyle = '#fbbf24';
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(ang + Math.PI / 37);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px Arial';
        ctx.fillText(n, r - 25, 5);
        ctx.restore();
      });
      ctx.beginPath(); ctx.arc(cx,cy,130,0,Math.PI*2); ctx.fillStyle = '#064e3b'; ctx.fill();
    }

    function spin() {
      if(spinning || Object.keys(bets).length === 0) return;
      spinning = true;
      document.getElementById('spinBtn').disabled = true;
      
      const target = Math.random() * Math.PI * 2 + (Math.PI * 10);
      let cur = 0, start = performance.now();
      
      function animate(t) {
        let elapsed = t - start;
        let progress = Math.min(elapsed / 4000, 1);
        let eased = 1 - Math.pow(1 - progress, 3);
        cur = target * eased;
        drawWheel(cur);
        if(progress < 1) requestAnimationFrame(animate);
        else finishSpin(cur);
      }
      requestAnimationFrame(animate);
    }

    function finishSpin(finalRot) {
      const normalized = (finalRot % (Math.PI * 2));
      const idx = Math.floor(((Math.PI * 2 - normalized + Math.PI/74) / (Math.PI * 2)) * 37) % 37;
      const res = LAYOUT[idx];
      
      let win = 0;
      if(bets[res]) win += bets[res] * 36;
      if(bets['red'] && REDS.includes(res)) win += bets['red'] * 2;
      if(bets['black'] && !REDS.includes(res) && res !== 0) win += bets['black'] * 2;
      if(bets['even'] && res % 2 === 0 && res !== 0) win += bets['even'] * 2;
      if(bets['odd'] && res % 2 !== 0) win += bets['odd'] * 2;
      if(bets['low'] && res >= 1 && res <= 18) win += bets['low'] * 2;
      if(bets['high'] && res >= 19 && res <= 36) win += bets['high'] * 2;

      const overlay = document.getElementById('overlay');
      document.getElementById('overlayTitle').textContent = res + (res === 0 ? '' : REDS.includes(res) ? ' RED' : ' BLACK');
      document.getElementById('overlayText').textContent = win > 0 ? `YOU WON ${win} COINS!` : 'NO WIN';
      overlay.classList.add('active');

      if(win > 0) updateCoins(win, 'roulette', 'win');
      bets = {};
      updateUI();
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
    }

    function resetUI() { document.getElementById('overlay').classList.remove('active'); }

    initGrid();
    drawWheel(0);
    window.addEventListener('load', () => {
      document.getElementById('balance').textContent = userCoins || 0;
    });
  </script>
</body>
</html>
