<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe - GameHub</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { background: #000; padding: 0; margin: 0; }
    .game-viewport { margin: 0; width: 100vw; height: 100vh; border-radius: 0; border: none; }

    .ttt-board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 10px;
      background: var(--border);
      padding: 10px;
      border-radius: 12px;
    }

    .cell {
      width: 100px;
      height: 100px;
      background: var(--bg-card);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 800;
      cursor: pointer;
      transition: var(--transition);
    }

    .cell:hover:not(.taken) { background: var(--bg-card-hover); }
    .cell.x { color: var(--accent-primary); }
    .cell.o { color: var(--accent-secondary); }
    .cell.winner { background: var(--success); color: #000; }
  </style>
</head>
<body>
  <div class="game-viewport">
    <div class="game-header">
      <div class="game-title-area">
        <h2>❌ Tic Tac Toe ⭕</h2>
      </div>
      <div class="game-stats-grid">
        <div class="game-stat-item">
          <span class="game-stat-label">Turn</span>
          <span class="game-stat-value" id="turnDisplay">X</span>
        </div>
      </div>
    </div>

    <div class="game-canvas-area">
      <div class="ttt-board" id="board">
        <div class="cell" onclick="play(0)"></div>
        <div class="cell" onclick="play(1)"></div>
        <div class="cell" onclick="play(2)"></div>
        <div class="cell" onclick="play(3)"></div>
        <div class="cell" onclick="play(4)"></div>
        <div class="cell" onclick="play(5)"></div>
        <div class="cell" onclick="play(6)"></div>
        <div class="cell" onclick="play(7)"></div>
        <div class="cell" onclick="play(8)"></div>
      </div>

      <div id="overlay" class="game-overlay-screen">
        <h2 class="game-overlay-title" id="overlayTitle">X Wins!</h2>
        <p id="overlayText" style="margin-bottom: 2rem;"></p>
        <button class="btn btn-primary" onclick="initGame()">Play Again</button>
      </div>
    </div>

    <div class="game-footer">
      <div id="status" style="color: var(--text-muted);">Local Multiplayer</div>
      <button class="btn" onclick="window.parent.closeGameContainer()" style="margin-left: auto;">Exit</button>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    let board = Array(9).fill('');
    let turn = 'X';
    let active = true;

    function initGame() {
      board = Array(9).fill('');
      turn = 'X';
      active = true;
      document.getElementById('overlay').classList.remove('active');
      document.getElementById('turnDisplay').textContent = 'X';
      const cells = document.querySelectorAll('.cell');
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
    }

    function play(i) {
      if(!active || board[i]) return;
      board[i] = turn;
      render();
      checkWin();
      if(active) {
        turn = turn === 'X' ? 'O' : 'X';
        document.getElementById('turnDisplay').textContent = turn;
      }
    }

    function render() {
      const cells = document.querySelectorAll('.cell');
      board.forEach((v, i) => {
        if(v) {
          cells[i].textContent = v;
          cells[i].classList.add('taken', v.toLowerCase());
        }
      });
    }

    function checkWin() {
      const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
      for(let w of wins) {
        if(board[w[0]] && board[w[0]] === board[w[1]] && board[w[0]] === board[w[2]]) {
          active = false;
          w.forEach(idx => document.querySelectorAll('.cell')[idx].classList.add('winner'));
          showResult(board[w[0]] + " Wins!");
          return;
        }
      }
      if(!board.includes('')) {
        active = false;
        showResult("It's a Draw!");
      }
    }

    function showResult(msg) {
      const overlay = document.getElementById('overlay');
      document.getElementById('overlayTitle').textContent = msg;
      overlay.classList.add('active');
      if(msg.includes('X') && typeof updateCoins === 'function') updateCoins(20, 'ttt', 'win');
    }

    initGame();
  </script>
</body>
</html>
